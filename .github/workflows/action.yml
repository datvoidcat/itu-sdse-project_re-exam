name: Train and Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:


jobs:
  train-test-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: dagger/go.sum


      - name: Run training via Dagger 
        run: |
          cd dagger
          go run main.go train
          cd ..

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/model.pkl

      - name: Run inference tests via Dagger
        run: |
          cd dagger
          go run main.go test
          cd ..


      # Run the ITU model validator action 
      - name: Run ITU model validator
        uses: lasselundstenjensen/itu-sdse-project-model-validator@main